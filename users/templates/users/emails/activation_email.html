<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm your email</title>
</head>
<body style="margin:0;padding:0;background-color:#ffffff;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
         style="background-color:#ffffff;padding:48px 40px;">
    <tr>
      <td style="max-width:600px;">

        <img src="cid:videoflix_logo" alt="Videoflix" width="251" height="40" alt="Videoflix" width="251" height="40"  style="display:block;margin:0 0 36px 0;" />

        <p style="margin:0 0 16px 0;font-size:15px;color:#222222;">Dear {{ user_email }},</p>

        <p style="margin:0 0 28px 0;font-size:15px;color:#444444;line-height:1.6;">
          Thank you for registering with <span style="color:#3547FF;font-weight:bold;">Videoflix</span>.
          To complete your registration and verify your email address, please click the link below:
        </p>

        <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 32px 0;">
          <tr>
            <td style="border-radius:6px;background-color:#3547FF;">
              <a href="{{ activation_link }}"
                 style="display:inline-block;padding:14px 28px;color:#ffffff;font-size:15px;
                        font-weight:bold;text-decoration:none;border-radius:6px;">
                Activate account
              </a>
            </td>
          </tr>
        </table>

        <p style="margin:0 0 36px 0;font-size:14px;color:#555555;">
          If you did not create an account with us, please disregard this email.
        </p>

        <p style="margin:0 0 4px 0;font-size:15px;color:#222222;">Best regards,</p>
        <p style="margin:0;font-size:15px;color:#222222;">Your Videoflix Team.</p>

      </td>
    </tr>
  </table>
</body>
</html>
